resources:
  pipelines:
    pipeline_pl_ariadm_arm_joh:
      name: PL_ARIADM_ARM_JOH
      allow_duplicate_names: true
      clusters:
        - label: default
          instance_pool_id: ${var.instance_pool_id}
          autoscale:
            min_workers: 5
            max_workers: 8
            mode: ENHANCED
      libraries:
        - notebook:
            path: "/Workspace/live/ARCHIVE/JOH/ARIADM_ARM_JOH"
      target: ARIADM_ARM_JOH
      development: true