resources:
  jobs:
    archive_republish_events_databricks_job:
      name: archive_republish_events_databricks_job
      parameters:
        - name: segment
          default: TD
      job_clusters:
        - job_cluster_key: archive_republish_events_databricks_job
          new_cluster:
            spark_version: ${var.cluster_config.spark_version}
            num_workers: 1
            instance_pool_id: ${var.instance_pool_id}
            driver_instance_pool_id: ${var.instance_pool_id}
            runtime_engine: PHOTON
      tasks:
        - task_key: archive_republish_events
          job_cluster_key: archive_republish_events_databricks_job
          notebook_task:
            notebook_path: "/Workspace/live/ARCHIVE/Utility/RepublishEvents"
            source: WORKSPACE
            base_parameters:
              segment: "{{job.parameters.segment}}"
