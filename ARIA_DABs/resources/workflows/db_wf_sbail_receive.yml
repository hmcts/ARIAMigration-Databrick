resources:
  jobs:
    db_wf_sbail_receive_job:
      name: db_wf_sbail_receive_job
      job_clusters:
        - job_cluster_key: db_wf_sbail_receive_job
          new_cluster:
            spark_version: ${var.cluster_config.spark_version}
            num_workers: 8
            instance_pool_id: ${var.instance_pool_id}
            driver_instance_pool_id: ${var.instance_pool_id}
            runtime_engine: PHOTON
      tasks:
        - task_key: run-my-wheel
          job_cluster_key: db_wf_sbail_receive_job
          python_wheel_task:
            entry_point: main
            package_name: shared_functions
          libraries: 
            - whl: "dbfs:/FileStore/packages/shared_functions-0.6.6-py3-none-any.whl"

        - task_key: collect_responses
          depends_on:
            - task_key: run-my-wheel
          job_cluster_key: db_wf_sbail_receive_job
          notebook_task:
            notebook_path: "/Workspace/live/ARCHIVE/SBAIL/bails_resp_autoloader"
            source: WORKSPACE  
      queue:
        enabled: true
