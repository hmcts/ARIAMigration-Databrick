bundle:
  name: ARIA_AssetBundle_Deployment

include:
  - "resources/pipelines/*.yml"
  - "resources/workflows/*.yml"

variables:
  instance_pool_id:
    description: "Pre-existing instance pool ID, resolved by name per target"
    lookup:
      instance_pool: aria-pool-${bundle.target}

  cluster_config:
    default:
      spark_version: 14.3.x-scala2.12
      instance_pool_id: ${var.instance_pool_id}
      driver_instance_pool_id: ${var.instance_pool_id}
      runtime_engine: PHOTON

targets:
  sbox00:
      workspace:
        host: https://adb-3635282203417052.12.azuredatabricks.net
      default : true
      presets:
        name_prefix: "[Sandbox00] "

  stg00:
      workspace: 
        host: https://adb-4305432441461530.10.azuredatabricks.net
      default : true
      presets:
        name_prefix: "[Staging00] "

  stg01:
      workspace: 
        host: https://adb-7405617797633943.3.azuredatabricks.net
      default : true
      presets:
        name_prefix: "[Staging01] "


