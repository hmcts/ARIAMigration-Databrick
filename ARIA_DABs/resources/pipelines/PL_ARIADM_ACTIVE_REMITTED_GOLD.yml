resources:
  pipelines:
    pipeline_pl_remitted_gold:
      name: PL_remitted_gold
      configuration:
        pipelines.tableManagedByMultiplePipelinesCheck.enabled: "false"

      clusters:
        - label: default
          node_type_id: Standard_D8ads_v5
          driver_node_type_id: Standard_D8ads_v5
          autoscale:
            min_workers: 1
            max_workers: 8
            mode: ENHANCED

      libraries:
        - notebook:
            path: "/Workspace/live/ACTIVE/APPEALS/GOLD_REMITTED_JSON"

      target: remitted_gold
      development: true
