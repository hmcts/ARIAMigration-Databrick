resources:
  jobs:
    cdam_databricks_job:
      name: cdam_databricks_job
      job_clusters:
        - job_cluster_key: cdam_databricks_job
          # new_cluster:
          #   spark_version: 14.3.x-scala2.12
          #   node_type_id: Standard_D8ds_v5
          #   num_workers: 4
          new_cluster:
            spark_version: ${var.cluster_config.spark_version}
            num_workers: 4
            instance_pool_id: ${var.instance_pool_id}
            driver_instance_pool_id: ${var.instance_pool_id}
            runtime_engine: PHOTON
      tasks:
        - task_key: DLT_creation_of_cdam_html
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_ariadm_active_appeals_cdam_html.id}
            full_refresh: true
        - task_key: active_cdam_publish
          depends_on: 
            - task_key: DLT_creation_of_cdam_html
          job_cluster_key: cdam_databricks_job
          notebook_task:
            notebook_path: "/Workspace/live/ACTIVE/MVP/CDAM/Active_CDAM_Publish"
            source: WORKSPACE
