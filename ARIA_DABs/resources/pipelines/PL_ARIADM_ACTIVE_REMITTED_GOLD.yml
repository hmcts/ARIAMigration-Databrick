resources:
  pipelines:
    pipeline_pl_remitted_gold:
      name: PL_remitted_gold
      configuration:
        pipelines.tableManagedByMultiplePipelinesCheck.enabled: "false"
      clusters:
        - label: default
          instance_pool_id: ${var.instance_pool_id}
          autoscale:
            min_workers: 5
            max_workers: 8
            mode: ENHANCED
      libraries:
        - notebook:
            path: "/Workspace/live/ACTIVE/APPEALS/GOLD_REMITTED_JSON"

      target: remitted_gold
      development: true
