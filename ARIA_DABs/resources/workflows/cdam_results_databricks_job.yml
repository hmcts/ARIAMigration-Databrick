resources:
  jobs:
    cdam_result_databricks_job:
      name: cdam_result_databricks_job
      job_clusters:
        - job_cluster_key: cdam_result_databricks_job
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_D8ds_v5
            num_workers: 4
      tasks:
        - task_key: active_results_cdam
          job_cluster_key: cdam_result_databricks_job
          notebook_task:
            notebook_path: "/Workspace/live/ACTIVE/MVP/CDAM/Active_CDAM_Results"
            source: WORKSPACE
      queue:
        enabled: true
