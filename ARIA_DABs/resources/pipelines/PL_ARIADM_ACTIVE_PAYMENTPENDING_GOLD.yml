resources:
  pipelines:
    pipeline_pl_paymentPending_gold:
      name: PL_paymentPending_gold
      configuration:
        pipelines.tableManagedByMultiplePipelinesCheck.enabled: "false"
      clusters:
        - label: default
          instance_pool_id: ${var.instance_pool_id}
          autoscale:
            min_workers: 1
            max_workers: 8
            mode: ENHANCED
      libraries:
        - notebook:
            path: "/Workspace/live/ACTIVE/APPEALS/GOLD_PAYMENT_PENDING_JSON"
      target: paymentPending_gold
      development: true