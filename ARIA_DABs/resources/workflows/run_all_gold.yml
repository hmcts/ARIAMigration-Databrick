resources:
  jobs:
    run_all_gold_pipelines:
      name: run_all_gold_pipelines
      tasks:
        - task_key: CUR
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_caseUnderReview_gold.id}
            full_refresh: true
        - task_key: PP
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_paymentPending_gold.id}
            full_refresh: true
        - task_key: APS
          depends_on:
            - task_key: PP
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_appealSubmitted_gold.id}
            full_refresh: true
        - task_key: AREa
          depends_on:
            - task_key: APS
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_awaitingRespondentEvidenceA_gold.id}
            full_refresh: true
        - task_key: AREb
          depends_on:
            - task_key: AREa
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_awaitingRespondentEvidenceB_gold.id}
            full_refresh: true
        - task_key: RFAPS
          depends_on:
            - task_key: CUR
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_reasonsForAppealSubmitted_gold.id}
            full_refresh: true
        - task_key: decision
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_decision_gold.id}
            full_refresh: true
        - task_key: decidedA
          depends_on:
            - task_key: decision
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_decided_a_gold.id}
            full_refresh: true
        - task_key: ftpaDecided
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_ftpa_decided_gold.id}
            full_refresh: true
        - task_key: decidedB
          depends_on:
            - task_key: ftpaDecided
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_decided_b_gold.id}
            full_refresh: true
        - task_key: ended
          depends_on:
            - task_key: decidedB
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_ended_gold.id}
            full_refresh: true
        - task_key: ftpaSubmittedA
          depends_on:
            - task_key: decidedA
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_ftpa_submitted_a_gold.id}
            full_refresh: true
        - task_key: ftpaSubmittedB
          depends_on:
            - task_key: ftpaSubmittedA
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_ftpa_submitted_b_gold.id}
            full_refresh: true
        - task_key: listing
          depends_on:
            - task_key: RFAPS
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_listing_gold.id}
            full_refresh: true
        - task_key: PFH
          depends_on:
            - task_key: listing
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_prepareForHearing_gold.id}
            full_refresh: true
        - task_key: remitted
          depends_on:
            - task_key: ended
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_pl_remitted_gold.id}
            full_refresh: true
      job_clusters:
        - job_cluster_key: Job_cluster
          new_cluster:
            spark_version: ${var.cluster_config.spark_version}
            num_workers: 1
            instance_pool_id: ${var.instance_pool_id}
            driver_instance_pool_id: ${var.instance_pool_id}
            runtime_engine: PHOTON
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
