resources:
  pipelines:
    pipeline_pl_listing_gold:
      name: PL_listing_gold
      configuration:
        pipelines.tableManagedByMultiplePipelinesCheck.enabled: "false"
      clusters:
        - label: default
          instance_pool_id: ${var.instance_pool_id}
          autoscale:
            min_workers: 5
            max_workers: 8
            mode: ENHANCED
      libraries:
        - notebook:
            path: "/Workspace/live/ACTIVE/APPEALS/GOLD_LISTING_JSON"
      target: listing_gold
      development: true