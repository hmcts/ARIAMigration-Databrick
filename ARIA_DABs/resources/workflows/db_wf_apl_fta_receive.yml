resources:
  jobs:
    db_wf_fta_receive_job:
      name: "db_wf_fta_receive_job"
      tasks:
        - task_key: collect_responses
          depends_on:
            - task_key: run-my-wheel
          notebook_task:
            notebook_path: /Workspace/live/ARCHIVE/APPEALS/ARIAFTA/fta_resp_autoloader
            source: WORKSPACE
          job_cluster_key: db_wf_fta_receive_job
        - task_key: run-my-wheel
          python_wheel_task:
            package_name: shared_functions
            entry_point: main
          job_cluster_key: db_wf_fta_receive_job
          libraries:
            - whl: dbfs:/FileStore/packages/shared_functions-0.6.6-py3-none-any.whl
      job_clusters:
        - job_cluster_key: db_wf_fta_receive_job
          new_cluster:
            spark_version: ${var.cluster_config.spark_version}
            num_workers: 8
            instance_pool_id: ${var.instance_pool_id}
            driver_instance_pool_id: ${var.instance_pool_id}
            runtime_engine: PHOTON
      queue:
        enabled: true
      run_as:
        user_name: andrew.mcdevitt@hmcts.net