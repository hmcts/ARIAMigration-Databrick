resources:
  pipelines:
    pipeline_pl_ariadm_arm_appeals:
      name: PL_ARIADM_ARM_APPEALS
      allow_duplicate_names: true
      clusters:
        - label: default
          instance_pool_id: ${var.instance_pool_id}
          autoscale:
            min_workers: 5
            max_workers: 8
            mode: ENHANCED
      libraries:
        - notebook:
            path: "/Workspace/live/ARCHIVE/APPEALS/ARIADM_ARM_APPEALS"
      target: ariadm_arm_appeals
      development: true
