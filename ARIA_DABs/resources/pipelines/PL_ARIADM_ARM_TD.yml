resources:
  pipelines:
    pipeline_pl_ariadm_arm_td:
      name: PL_ARIADM_ARM_TD
      allow_duplicate_names: true
      clusters:
        - label: default
          instance_pool_id: ${var.instance_pool_id}
          autoscale:
            min_workers: 5
            max_workers: 8
            mode: ENHANCED
      libraries:
        - notebook:
            path: "/Workspace/live/ARCHIVE/TD/ARIADM_ARM_TD"
      target: ariadm_arm_td
      development: true
